<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英语单词大冒险 — English Word Quest RPG</title>

  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/title.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="css/dungeon.css">
  <link rel="stylesheet" href="css/battle.css">
  <link rel="stylesheet" href="css/character.css">
  <link rel="stylesheet" href="css/shop.css">
  <link rel="stylesheet" href="css/avatar.css">

  <!-- Favicon (emoji) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>⚔️</text></svg>">
</head>
<body>
  <div id="app-root">
    <!-- Main screen container - all screens render here -->
    <div id="screen-container"></div>

    <!-- Notification layer for toasts and floating messages -->
    <div id="notification-layer"></div>
  </div>

  <!-- Legacy browser warning (shown if modules not supported) -->
  <noscript>
    <div style="padding: 40px; text-align: center; font-family: sans-serif;">
      <h1>⚠️ 需要 JavaScript</h1>
      <p>请启用 JavaScript 后刷新页面。</p>
    </div>
  </noscript>

  <!-- Application Entry Point -->
  <script type="module" src="js/app.js"></script>

  <!-- Fallback for browsers that don't support ES modules -->
  <script nomodule>
    document.getElementById('app-root').innerHTML = `
      <div style="padding: 40px; text-align: center; font-family: 'Microsoft YaHei', sans-serif; color: #e8e8e8;">
        <h1 style="color: #ffd700;">⚠️ 浏览器不兼容</h1>
        <p style="margin: 20px 0;">此游戏需要支持 ES6 模块的现代浏览器。</p>
        <p>请使用以下浏览器打开：</p>
        <ul style="list-style: none; padding: 0; margin: 20px 0;">
          <li>✅ Google Chrome（推荐）</li>
          <li>✅ Microsoft Edge</li>
          <li>✅ Firefox</li>
        </ul>
        <p style="color: #a0a0b0; font-size: 0.9rem;">
          如果您使用 Chrome/Edge 仍看到此提示，请尝试用本地服务器打开：<br>
          <code style="background: #1a1a2e; padding: 4px 8px; border-radius: 4px;">python -m http.server 8080</code><br>
          然后访问 <code style="background: #1a1a2e; padding: 4px 8px; border-radius: 4px;">http://localhost:8080</code>
        </p>
      </div>
    `;
  </script>
</body>
</html>
